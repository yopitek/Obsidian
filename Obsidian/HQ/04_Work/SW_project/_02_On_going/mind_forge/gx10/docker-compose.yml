services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: mindforge
      POSTGRES_USER: mindforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindforge -d mindforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  embedding:
    build: ./services/embedding
    restart: unless-stopped
    environment:
      - HF_HOME=/models
    volumes:
      - hf_cache:/models
    deploy:
      resources:
        limits:
          memory: 6g

  api:
    build: ./services/api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://mindforge:${POSTGRES_PASSWORD}@postgres:5432/mindforge
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      EMBEDDING_URL: http://embedding:8001
      LLM_BASE_URL: ${LLM_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: ./services/api
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://mindforge:${POSTGRES_PASSWORD}@postgres:5432/mindforge
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      EMBEDDING_URL: http://embedding:8001
      LLM_BASE_URL: ${LLM_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pg_data:
  hf_cache:
  redis_data:
